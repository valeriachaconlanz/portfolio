name: CI

on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same branch makes an in-flight run obsolete.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      # Node 24 to match Vercel's production runtime.
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      # Guards the résumé facts: no excluded employers, SproutFund credited
      # as a team effort, skills derived from real work.
      - name: Unit tests
        run: npm test

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # Guards content integrity and accessibility in a real browser.
      - name: End-to-end tests
        run: npm run e2e

      - name: Production build
        run: npm run build

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
